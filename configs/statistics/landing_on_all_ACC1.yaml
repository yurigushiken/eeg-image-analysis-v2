input_csv: "docs/assets/tables/landing_on_all_ACC1/subject_measurements.csv"
output_dir: "docs/assets/stats/landing_on_all_ACC1"

filters:
  min_snr: null
  dropna: true

correction_family: "component"

components:
  - Fz
  - N1
  - P1
  - P3b

dependent_variables:
  - peak_latency_ms
  - peak_amplitude_roi

tests:
  anova:
    enabled: true
    within: condition
    subject: subject_id
    output_format: csv
    detailed: true

  pairwise:
    enabled: true
    within: condition
    subject: subject_id
    correction: fdr_bh
    effsize: cohen
    output_format: csv

  lmm:
    enabled: false

  lmm_pairwise:
    enabled: false

descriptives:
  enabled: true
  groupby: condition
  output_format: csv

output:
  print_to_console: true
  decimal_precision: 4
  create_summary: true
  summary_filename: "statistical_summary.json"

plots:
  enabled: false

reporting:
  include_library_versions: true
  include_gg_correction: true
  use_generalized_eta_squared: true
  include_effect_size_ci: true
  document_missing_data: true
  document_measurement_windows: true

advanced:
  random_seed: 42
  alpha: 0.05
  save_filtered_data: false
  verbosity: 1

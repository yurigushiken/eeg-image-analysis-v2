dataset:
  root: data/lab_data_original
  pattern: sub-*_preprocessed-epo.fif
  montage_sfp: assets/net/AdultAverageNet128_v1.sfp
selection:
  response: ALL
  min_epochs_per_set: 1
  condition_sets:
  - name: Change by 1
    conditions:
    - '12'
    - '23'
    - '34'
    - '45'
    - '56'
    - '21'
    - '32'
    - '43'
    - '54'
    - '65'
    color: '#1f77b4'
    linestyle: ':'
  - name: Change by 2
    conditions:
    - '13'
    - '24'
    - '35'
    - '46'
    - '31'
    - '42'
    - '53'
    - '64'
    color: '#1f77b4'
    linestyle: --
  - name: Change by 3
    conditions:
    - '14'
    - '25'
    - '36'
    - '41'
    - '52'
    - '63'
    color: '#1f77b4'
    linestyle: '-'
components:
- P1
- N1
- P3b
- Fz
preprocessing:
  baseline_ms:
  - -100
  - 0
roi:
  min_channels: 4
plots:
  formats:
  - png
  dpi: 300
  colors:
  - '#1f77b4'
  - '#1f77b4'
  - '#1f77b4'
outputs:
  page: docs/analysis/change_by_123_ALL.md
  plots_dir: docs/assets/plots/change_by_123_ALL
  tables_dir: docs/assets/tables/change_by_123_ALL
measurement:
  latency: peak
  amplitude: peak
  peak_to_peak:
    enabled: true
    roi:
    - N1_L
    - N1_R
    hline_color: '#000000'
    hline_style: ':'
